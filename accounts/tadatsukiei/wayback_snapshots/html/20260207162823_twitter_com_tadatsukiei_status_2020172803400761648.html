  「不要将人变成工具」吗？可能是吧，我从小在一个法西斯式的国家长大，“祖国，家庭，劳动”，他们无时无刻不在灌输这些东西的神圣性。
  <br/>
  而我恰好天生喜欢追问、喜欢抬杠、喜欢解构。于是，在一众狂热举起右拳宣誓的人群中，我分明看见，那是纳粹礼……
  <br/>

  <br/>
